# StockAnalyzer Configuration
# All tunable parameters in one place. Per-step LLM model selection allows
# using reasoning models for judgment and cheaper models for data gathering.

llm:
  # Step 1: Web research (data gathering — no judgment needed)
  research_model: "gpt-4o"
  research_temperature: 0.2

  # Step 2: Structured analysis (qualitative judgment)
  analysis_model: "gpt-4o"
  analysis_temperature: 0.2

  # Phase 2.75: Institutional validation (requires deep reasoning)
  institutional_validation_model: "o3-mini"

  # Phase 2.5: Devil's Advocate (skeptical cross-check)
  devils_advocate_model: "gpt-4o"
  devils_advocate_temperature: 0.2

  # Candidates per LLM batch
  batch_size: 4

  # Concurrent LLM workers (batches processed in parallel)
  max_llm_workers: 3

screener:
  # Universe filters
  market_cap_min: 500_000_000
  market_cap_max: 25_000_000_000
  min_avg_volume_3m: 200_000

  # Technical / quantitative filters
  min_avg_daily_dollar_volume: 10_000_000
  max_pct_above_breakout: 30
  min_relative_volume: 1.5
  max_pct_from_52wk_high: 15.0
  max_pct_below_200dma: 5.0
  breakout_lookback_days: 20
  recent_breakout_window: 10
  ohlcv_history_days: 260
  min_breakout_volume_ratio: 1.3

  # Qualitative score thresholds (Phase 2/3)
  min_early_stage_timing_score: 6
  min_narrative_freshness_score: 5

  # Data fetching
  market_data_chunk_size: 100
  universe_page_size: 250
  max_download_workers: 1

validation:
  # Phase 2.75: minimum institutional score to pass (1-10, 10=undiscovered)
  min_institutional_validation_score: 6
  # DA override: only override DA rejection if conviction exceeds this
  min_conviction_for_da_override: 80

paths:
  results_dir: "results"
  tracking_dir: "results/tracking"
